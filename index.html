<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Quiz</title>
    <link rel="stylesheet" href="styles.css" class="stylesheets" />
  </head>
  <body>
    <div id="start-screen">
      <h1>Code & Gains Quiz</h1>
      <p>Build the web. 💪 Build the body. 📈 Build the future.</p>
      <button id="start-button">Start Quiz</button>
    </div>

    <div id="quiz-container" class="hidden">
      <h1>💻 Code & Gains Quiz</h1>
      <p>
        Build the web. <span class="highlight">💪 Build the body.</span> Build
        the future.
      </p>
      <p id="progress-text"></p>

      <div id="question-container"></div>
      <div id="options-container"></div>

      <button id="next-button">Next Question</button>
    </div>

    <div id="score-container" class="hidden">
      <div id="review-container"></div>
      <h2>Your Score</h2>
      <p id="score"></p>
      <button id="restart-button">Restart Quiz</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
